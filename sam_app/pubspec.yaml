name: sam_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^0.13.6
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  flutter_quill: ^11.4.2
  crop_your_image: ^2.0.0
  palette_generator: ^0.3.2
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  open_file: ^3.5.10
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.0
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.3.0

flutter_native_splash:
  color: "#090D1D"
  color_dark: "#090D1D"

  android_12:
    color: "#090D1D"
    color_dark: "#090D1D"

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#090D1D"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
